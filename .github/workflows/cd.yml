name: CD

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://promobrindes.com.br # URL de exemplo para o ambiente de produção
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build and Bundle Audit
        run: |
          npm run build
          echo "### Bundle Size Audit" >> $GITHUB_STEP_SUMMARY
          SIZE=$(du -sk dist/assets | cut -f1)
          echo "Total assets size: ${SIZE}KB" >> $GITHUB_STEP_SUMMARY
          if [ $SIZE -gt 1024 ]; then
            echo ":warning: Bundle size is too large ($SIZE KB > 1024 KB)" >> $GITHUB_STEP_SUMMARY
            # fail if it exceeds a critical limit, e.g., 2MB
            if [ $SIZE -gt 2048 ]; then
              echo "::error::Bundle size exceeded 2MB limit!"
              exit 1
            fi
          fi
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
