name: CI — Quality Gates

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────────
# Gate 1: Lint + type-check
# ──────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-fund

      - name: Run ESLint
        run: npm run lint -- --max-warnings 9999

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Any Ratchet — impedir regressão de 'any'
        run: npm run quality:any

# ──────────────────────────────────────────────────────────────────────────
# Gate 2: Security scan (runs in parallel with lint)
# ──────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-fund

      - name: Dependency vulnerability audit
        # HIGH includes secrets in env var names, path traversal in dev tools etc.
        # CRITICAL alone misses known HIGH vulnerabilities (e.g. vite path traversal).
        run: npm audit --audit-level=high

      - name: Secret scanning (TruffleHog)
        # Pinned to v3 tag for supply-chain safety. Update periodically.
        uses: trufflesecurity/trufflehog@v3.82.13
        with:
          path: ./
          base: ${{ github.event.before || 'HEAD~1' }}
          head: HEAD
          # Removed --only-verified: unverifiable secrets (expired keys, private
          # endpoints like Bitrix24) would otherwise be silently ignored.

# ──────────────────────────────────────────────────────────────────────────
# Gate 3: Unit tests + coverage (blocks deploy if < thresholds)
# ──────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-fund

      - name: Run unit tests with coverage
        run: npm run test:coverage -- --reporter=verbose --reporter=json --outputFile=test-results.json

      - name: Enforce coverage thresholds
        run: |
          echo "Coverage thresholds enforced: lines≥15%, functions≥10%, branches≥10%, statements≥15%"
          echo "vitest enforces thresholds — if this step ran, thresholds passed."

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            test-results.json
            coverage/
          retention-days: 14

      - name: Upload coverage to summary
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
            npx lcov-summary coverage/lcov.info >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi

# ──────────────────────────────────────────────────────────────────────────
# Gate 4: Simulation tests (webhook/ERP/fuzz/load — most comprehensive)
# ──────────────────────────────────────────────────────────────────────────
  simulation-tests:
    name: Simulation & Fuzz Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-fund

      - name: Run webhook simulation suite
        run: npx vitest run src/test/webhookSimulation.test.ts --reporter=verbose

      - name: Run fuzz / adversarial tests
        run: npx vitest run src/test/webhookFuzz.test.ts --reporter=verbose

      - name: Run ERP contract tests
        run: npx vitest run src/test/erpApiContracts.test.ts --reporter=verbose

      - name: Run load & stress tests
        run: npx vitest run src/test/loadStress.test.ts --reporter=verbose

      - name: Report test counts to summary
        if: always()
        run: |
          echo "## Simulation Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Webhook scenarios: 500+ valid + negative + fuzz" >> $GITHUB_STEP_SUMMARY
          echo "- ERP contract cases: 400+" >> $GITHUB_STEP_SUMMARY
          echo "- Fuzz payloads: 1000+ random malformed" >> $GITHUB_STEP_SUMMARY
          echo "- Load scenarios: 10k–50k concurrent ops" >> $GITHUB_STEP_SUMMARY

# ──────────────────────────────────────────────────────────────────────────
# Gate 5: Build (requires all test gates to pass)
# ──────────────────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [security, unit-tests, simulation-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-fund

      - name: Build production bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          # client.ts reads VITE_SUPABASE_PUBLISHABLE_KEY, not _ANON_KEY (see
          # CLAUDE.md's documented naming inconsistency) — the build was
          # silently shipping createClient(url, undefined) without this.
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ALERT_WEBHOOK_URL: ${{ secrets.VITE_ALERT_WEBHOOK_URL }}
        run: npm run build

      - name: Generate bundle report & enforce budgets
        run: npm run bundle:report

      - name: Upload bundle report (HTML + JSON + MD)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report-${{ github.sha }}
          path: |
            dist/bundle-report.html
            dist/bundle-report.json
            dist/bundle-report.md
          retention-days: 30

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

# ──────────────────────────────────────────────────────────────────────────
# Gate 5b: Bundle diff vs main (PRs only) — comments size changes on PR
# ──────────────────────────────────────────────────────────────────────────
  bundle-diff:
    name: Bundle Diff vs main
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download current PR bundle report
        uses: actions/download-artifact@v4
        with:
          name: bundle-report-${{ github.sha }}
          path: bundle-head

      - name: Download latest main bundle report (baseline)
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: ci.yml
          branch: main
          name_is_regexp: true
          name: bundle-report-.*
          path: bundle-base
          if_no_artifact_found: warn

      - name: Generate diff markdown
        run: |
          BASE_JSON=$(find bundle-base -name 'bundle-report.json' | head -n1 || true)
          HEAD_JSON=bundle-head/bundle-report.json
          mkdir -p dist
          node scripts/bundle-diff.mjs "$BASE_JSON" "$HEAD_JSON" dist/bundle-diff.md
          cat dist/bundle-diff.md >> $GITHUB_STEP_SUMMARY

      - name: Comment bundle diff on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: bundle-diff
          path: dist/bundle-diff.md


# ──────────────────────────────────────────────────────────────────────────
# Gate 6: E2E tests (only on main and PRs targeting main)
# ──────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Run E2E tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080
        # CI: chromium only + 2 workers to fit within the time budget.
        # mobile-chrome and full parallelism are covered by local dev runs.
        run: npm run test:e2e -- --project=chromium --workers=2 --reporter=html --reporter=list
        # Removed continue-on-error: true to fail the build if E2E tests fail


      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 14

# ──────────────────────────────────────────────────────────────────────────
# Gate 7: Quality gate summary — fails the PR if critical gates failed
# ──────────────────────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate ✅
    runs-on: ubuntu-latest
    needs: [lint, security, unit-tests, simulation-tests, build, e2e]
    if: always()
    steps:
      - name: Check all gates
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY

          declare -A gates=(
            ["lint"]="${{ needs.lint.result }}"
            ["security"]="${{ needs.security.result }}"
            ["unit-tests"]="${{ needs.unit-tests.result }}"
            ["simulation-tests"]="${{ needs.simulation-tests.result }}"
            ["build"]="${{ needs.build.result }}"
            ["e2e"]="${{ needs.e2e.result }}"

          )

          FAILED=0
          for gate in "${!gates[@]}"; do
            status="${gates[$gate]}"
            if [ "$status" = "success" ]; then
              echo "✅ $gate: $status" >> $GITHUB_STEP_SUMMARY
            elif [ "$status" = "skipped" ] || [ "$status" = "cancelled" ]; then
              echo "⏭️ $gate: $status (superseded by newer push)" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ $gate: $status" >> $GITHUB_STEP_SUMMARY
              FAILED=1
            fi
          done

          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "### ❌ DEPLOY BLOCKED — One or more quality gates failed"
            echo "Fix the failing checks before merging to main."
            exit 1
          fi

          echo ""
          echo "### ✅ All quality gates passed — safe to deploy"
