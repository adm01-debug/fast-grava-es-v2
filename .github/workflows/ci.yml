name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        
      - name: Install dependencies
        run: bun install
        
      - name: Lint check
        run: bun run lint
        
      - name: Type check
        run: bunx tsc --noEmit
        
      - name: Unit & Integration Tests
        run: bun run test
        
      - name: Build check
        run: bun run build
        
      - name: E2E Tests
        run: |
          npx playwright install --with-deps chromium
          bunx playwright test
