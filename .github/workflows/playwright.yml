name: E2E Tests CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 20
    - name: Install dependencies
      run: npm install --legacy-peer-deps --no-fund
    - name: Lint check
      run: npm run lint -- --max-warnings 9999
    - name: Run unit and integration tests
      run: npm run test
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Build project
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        # client.ts reads VITE_SUPABASE_PUBLISHABLE_KEY, not _ANON_KEY.
        VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      run: npm run build
    - name: Run E2E tests
      run: npm run test:e2e
      env:
        DEBUG: pw:api
    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Upload failure artifacts
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-failure-artifacts
        path: test-results/
        retention-days: 7
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage/
        retention-days: 30
